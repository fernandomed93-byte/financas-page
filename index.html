<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mail Confirmado!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #2ecc71; }
        p { color: #666; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #2ecc71; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✅ E-mail Confirmado!</h1>
        <p>Obrigado por validar seu e-mail.</p>
        <p>Agora você já pode voltar para o aplicativo.</p>
    </div>
</body>
    
<script>
  // Verifica se a URL contém o hash de confirmação do Supabase
  window.onload = function() {
    const hash = window.location.hash;
    if (hash && hash.includes("type=recovery")) {
      // Redireciona para o seu app usando Deep Link
      // O Flutter vai receber o hash e o Supabase SDK vai processar a sessão
      window.location.href = "financas://reset-password/" + hash;
    }
  };
</script>
</html>
