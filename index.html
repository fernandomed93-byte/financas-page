<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processando...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #2ecc71; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="status-title">Processando solicitação...</h1>
        <p id="status-desc">Aguarde um momento enquanto te levamos de volta ao app.</p>
        <a href="financas://login" id="fallback-btn" style="display:none; margin-top:20px; padding:10px 20px; background:#2ecc71; color:white; text-decoration:none; border-radius:8px;">Abrir App Manualmente</a>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const hash = window.location.hash;
            const code = urlParams.get('code'); // Pega o ?code=...
            const titleEl = document.getElementById('status-title');
            const messageEl = document.getElementById('status-desc');
            const btnEl = document.getElementById('fallback-btn');
        
            // 1. CASO: RECUPERAÇÃO DE SENHA (O que você testou agora)
            if (code) {
                titleEl.innerText = "🔑 Recuperação de Senha";
                messageEl.innerText = "Validamos seu código. Estamos te levando de volta ao app para criar a nova senha...";
                
                const deepLink = "financas://reset-password/?code=" + code;
                btnEl.href = deepLink;
                btnEl.style.display = 'inline-block';
                
                setTimeout(() => { window.location.href = deepLink; }, 1500);
            }
            // 2. CASO: CONFIRMAÇÃO DE E-MAIL (O que você perguntou)
            else if (hash && hash.includes("type=signup")) {
                titleEl.innerText = "✅ E-mail Confirmado!";
                messageEl.innerText = "Obrigado por validar seu acesso. Você já pode utilizar todas as funções do app.";
                
                const deepLink = "financas://login"; // Aqui ele só volta para o login
                btnEl.href = deepLink;
                btnEl.style.display = 'inline-block';
                btnEl.innerText = "Voltar para o App";
        
                setTimeout(() => { window.location.href = deepLink; }, 1500);
            }
        };
    </script>
</body>
</html>
